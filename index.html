<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADAM BARBERSHOP</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    font-family: Arial, Helvetica, sans-serif;

    /* SFONDO */
    background: url("logo.jpg") no-repeat center center;
    background-size: 185%;
}

/* CONTENITORE BOTTONI */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* BOTTONI */
.link-btn {
    width: 280px;
    text-align: center;

    padding: 16px;
    text-decoration: none;

    color: white;
    font-weight: bold;
    letter-spacing: 1px;

    border: 2px solid gold;
    border-radius: 14px;

    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(8px);

    transition: 0.3s ease;

    box-shadow: 0 0 15px rgba(255, 215, 0, 0.25);
}

.link-btn:hover {
    background: gold;
    color: black;
    transform: scale(1.05);

    box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
}
</style>

</head>

<body>

<div class="buttons">

    <a href="landing.html" class="link-btn">
        1° Barber Shop
    </a>

    <a href="indexx.html" class="link-btn">
        2° Barber Shop
    </a>

    <a href="indexxx.html" class="link-btn">
        3° Barber Shop
    </a>

</div>

</body>
</html>
