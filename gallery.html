```html
<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery — Adam Barbershop</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}

/* =========================
ROOT
========================= */

:root{
--gold:#d4af37;
--gold2:#ffd86b;
--muted:#9f9f9f;
--border:rgba(212,175,55,.15);
--transition:.4s cubic-bezier(.19,1,.22,1);
}

/* =========================
GLOBAL
========================= */

.container{
width:100%;
max-width:1500px;
margin:auto;
padding:0 7%;
}

a{
text-decoration:none;
color:inherit;
}

img{
display:block;
width:100%;
}

/* =========================
NAVBAR
========================= */

nav{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
background:rgba(5,5,5,.85);
backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
}

.nav-inner{
max-width:1500px;
margin:auto;
padding:22px 7%;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:1.7rem;
font-weight:900;
letter-spacing:2px;
color:var(--gold);
}

.logo span{
color:white;
}

.back-btn{
padding:14px 22px;
border-radius:18px;
border:1px solid var(--gold);
font-weight:700;
color:var(--gold);
transition:var(--transition);
}

.back-btn:hover{
background:var(--gold);
color:black;
}

/* =========================
HERO
========================= */

.hero{
padding-top:180px;
padding-bottom:70px;
text-align:center;
}

.hero h1{
font-size:5rem;
font-weight:900;
letter-spacing:-3px;
line-height:1;
margin-bottom:25px;
}

.gradient{
background:linear-gradient(90deg,var(--gold),var(--gold2));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
max-width:760px;
margin:auto;
line-height:1.9;
color:var(--muted);
font-size:1.05rem;
}

/* =========================
SLIDER
========================= */

.gallery{
padding-bottom:120px;
}

.slider-wrapper{
display:flex;
align-items:center;
justify-content:center;
gap:25px;
position:relative;
}

.slider-window{
width:100%;
max-width:950px;
overflow:hidden;
border-radius:34px;
}

.slider-track{
display:flex;
transition:transform .7s cubic-bezier(.19,1,.22,1);
}

.slider-track img{
width:100%;
max-width:950px;
height:650px;
object-fit:cover;
flex-shrink:0;
border-radius:34px;
border:1px solid var(--border);
}

/* =========================
ARROWS
========================= */

.arrow{
width:65px;
height:65px;
border-radius:50%;
border:1px solid var(--border);
background:rgba(15,15,15,.85);
backdrop-filter:blur(10px);
color:var(--gold);
font-size:2.5rem;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:var(--transition);
}

.arrow:hover{
background:var(--gold);
color:black;
transform:scale(1.08);
}

/* =========================
FOOTER
========================= */

footer{
padding:50px 7%;
border-top:1px solid var(--border);
text-align:center;
color:var(--muted);
font-size:.95rem;
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:900px){

.hero h1{
font-size:3.5rem;
}

.slider-track img{
height:520px;
}

.arrow{
width:55px;
height:55px;
font-size:2rem;
}

}

@media(max-width:600px){

.hero{
padding-top:150px;
}

.hero h1{
font-size:2.6rem;
letter-spacing:-2px;
}

.slider-wrapper{
gap:10px;
}

.slider-track img{
height:430px;
border-radius:24px;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
z-index:20;
width:50px;
height:50px;
font-size:1.8rem;
}

.arrow.left{
left:10px;
}

.arrow.right{
right:10px;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="nav-inner">

<div class="logo">
ADAM<span>BARBERSHOP</span>
</div>

<a href="index.html" class="back-btn">
← Home
</a>

</div>

</nav>

<!-- HERO -->

<section class="hero">

<div class="container">

<h1>
La nostra <span class="gradient">Gallery</span>
</h1>

<p>
Fade puliti, skincut precisi e tagli moderni.
Scorri la gallery e scopri alcuni lavori realizzati da Adam Barbershop.
</p>

</div>

</section>

<!-- GALLERY -->

<section class="gallery">

<div class="container">

<div class="slider-wrapper">

<button class="arrow left" onclick="prevSlide()">
‹
</button>

<div class="slider-window">

<div class="slider-track" id="slider-track">

<img src="foto1.jpeg" alt="">
<img src="foto2.jpeg" alt="">
<img src="foto3.jpeg" alt="">
<img src="foto4.jpeg" alt="">
<img src="foto5.jpeg" alt="">
<img src="foto6.jpeg" alt="">
<img src="foto7.jpeg" alt="">
<img src="foto8.jpeg" alt="">
<img src="foto9.jpeg" alt="">
<img src="foto10.jpeg" alt="">
<img src="foto11.jpeg" alt="">
<img src="foto12.jpeg" alt="">
<img src="foto13.jpeg" alt="">
<img src="foto14.jpeg" alt="">
<img src="foto15.jpeg" alt="">
<img src="foto16.jpeg" alt="">
<img src="foto17.jpeg" alt="">
<img src="foto18.jpeg" alt="">
<img src="foto20.jpeg" alt="">

</div>

</div>

<button class="arrow right" onclick="nextSlide()">
›
</button>

</div>

</div>

</section>

<!-- FOOTER -->

<footer>
© 2026 Adam Barbershop — Mariano Comense
</footer>

<script>

let currentSlide = 0;

const track = document.getElementById("slider-track");
const slides = document.querySelectorAll("#slider-track img");

function updateSlider(){

  const slideWidth = slides[0].clientWidth;

  track.style.transform =
  `translateX(-${currentSlide * slideWidth}px)`;

}

function nextSlide(){

  if(currentSlide < slides.length - 1){
    currentSlide++;
  } else {
    currentSlide = 0;
  }

  updateSlider();

}

function prevSlide(){

  if(currentSlide > 0){
    currentSlide--;
  } else {
    currentSlide = slides.length - 1;
  }

  updateSlider();

}

/* TOUCH MOBILE */

let startX = 0;

track.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

track.addEventListener("touchend", e => {

  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    nextSlide();
  }

  if(endX - startX > 50){
    prevSlide();
  }

});

window.addEventListener("resize", updateSlider);

</script>

</body>
</html>
