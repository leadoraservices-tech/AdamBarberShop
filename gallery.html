<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery ADAM BARBERSHOP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

/* Wrapper per decentramento verticale */
.gallery-wrapper{
    position:absolute;
    top:120px; /* decentramento verticale */
    left:0;
    right:0;
}

/* Gallery scorrevole */
.gallery{
    display:flex;
    gap:25px;
    width:max-content;
    animation:scrollGallery 40s linear infinite;
}

/* Animazione autoscroll */
@keyframes scrollGallery{
    0%{
        transform:translateX(0);
    }
    100%{
        transform:translateX(-50%);
    }
}

/* CONTENITORE GALLERY */
.gallery{

    display:flex;

    gap:25px;

    width:max-content;

    padding:40px;

    /* SPOSTA LA GALLERY PIÙ IN BASSO */
    transform:translateY(120px);

    animation:scrollGallery 40s linear infinite;
}
/* CARD IMMAGINI */
.photo{

    width:320px;
    height:420px;

    border-radius:20px;

    overflow:hidden;

    position:relative;

    border:2px solid rgba(255,215,0,0.7);

    box-shadow:
    0 0 20px rgba(255,215,0,0.25),
    0 0 40px rgba(0,0,0,0.8);

    transition:0.4s ease;

    flex-shrink:0;
}

.photo:hover{

    transform:scale(1.05);

    box-shadow:
    0 0 35px rgba(255,215,0,0.7);

}

/* IMMAGINI */
.photo img{

    width:100%;
    height:100%;

    object-fit:cover;

    transition:0.5s ease;
}

.photo:hover img{
    transform:scale(1.1);
}

/* EFFETTO SCURO */
.photo::after{
    content:"";

    position:absolute;

    inset:0;

    background:linear-gradient(
        to top,
        rgba(0,0,0,0.5),
        transparent
    );
}

/* PULSANTE BACK */
.back-btn{

    position:fixed;

    top:25px;
    left:25px;

    padding:14px 24px;

    text-decoration:none;

    color:white;

    border:2px solid gold;

    border-radius:14px;

    background:rgba(0,0,0,0.55);

    backdrop-filter:blur(8px);

    font-weight:bold;

    letter-spacing:1px;

    transition:0.3s ease;

    z-index:999;
}

.back-btn:hover{

    background:gold;

    color:black;

    box-shadow:
    0 0 20px rgba(255,215,0,0.7);

}

/* SFUMATURE LATERALI FIGHE */
.fade-left,
.fade-right{

    position:fixed;

    top:0;

    width:180px;
    height:100%;

    z-index:10;

    pointer-events:none;
}

.fade-left{
    left:0;
    background:linear-gradient(to right, black, transparent);
}

.fade-right{
    right:0;
    background:linear-gradient(to left, black, transparent);
}

</style>
</head>

<body>

<!-- PULSANTE RITORNO -->
<a href="index.html" class="back-btn">
    ← Torna Indietro
</a>

<!-- SFUMATURE -->
<div class="fade-left"></div>
<div class="fade-right"></div>

<body>

<!-- Contenitore per decentramento verticale -->
<div class="gallery-wrapper">

    <div class="gallery">
        <!-- foto1-20 e duplicati per autoscroll -->
        <div class="photo"><img src="foto1.jpg"></div>
        <div class="photo"><img src="foto2.jpg"></div>
        <div class="photo"><img src="foto3.jpg"></div>
        <div class="photo"><img src="foto4.jpg"></div>
        <div class="photo"><img src="foto5.jpg"></div>

        <div class="photo"><img src="foto6.jpg"></div>
        <div class="photo"><img src="foto7.jpg"></div>
        <div class="photo"><img src="foto8.jpg"></div>
        <div class="photo"><img src="foto9.jpg"></div>
        <div class="photo"><img src="foto10.jpg"></div>

        <div class="photo"><img src="foto11.jpg"></div>
        <div class="photo"><img src="foto12.jpg"></div>
        <div class="photo"><img src="foto13.jpg"></div>
        <div class="photo"><img src="foto14.jpg"></div>
        <div class="photo"><img src="foto15.jpg"></div>

        <div class="photo"><img src="foto16.jpg"></div>
        <div class="photo"><img src="foto17.jpg"></div>
        <div class="photo"><img src="foto18.jpg"></div>
        <div class="photo"><img src="foto19.jpg"></div>
        <div class="photo"><img src="foto20.jpg"></div>

    </div>

</div>

</body>
</html>
